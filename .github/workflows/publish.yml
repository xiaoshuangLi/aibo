name: Publish

on:
  push:
    branches: [master]
  # 也可以手动触发
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 获取最近两次提交用于比较

      - name: 🔍 Check if version is already published on npm
        id: check_npm
        run: |
          PACKAGE_NAME=$(jq -r '.name' package.json)
          CURRENT_VERSION=$(jq -r '.version' package.json)
          PUBLISHED=$(npm view "${PACKAGE_NAME}@${CURRENT_VERSION}" version 2>/dev/null | tr -d '[:space:]' || echo "")
          if [ "$PUBLISHED" = "$CURRENT_VERSION" ]; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "Version ${CURRENT_VERSION} is already published on npm. Skipping publish."
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "Version ${CURRENT_VERSION} is not yet published on npm. Proceeding."
          fi

      - name: 🐘 Setup Node.js
        if: steps.check_npm.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Cache node_modules
        id: cache-node-modules
        if: steps.check_npm.outputs.should_publish == 'true'
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📦 Install dependencies
        # 只有当 package-lock.json 或 package.json 发生变化时才重新安装
        if: steps.check_npm.outputs.should_publish == 'true' && steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm i

      - name: 🏗️ Build project
        if: steps.check_npm.outputs.should_publish == 'true'
        run: npm run build

      - name: 🧪 Run tests
        if: steps.check_npm.outputs.should_publish == 'true'
        run: npm test

      - name: 🚀 Publish to NPM
        if: steps.check_npm.outputs.should_publish == 'true'
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # 您可以在这里添加其他需要的环境变量
          # CUSTOM_VAR: ${{ secrets.CUSTOM_VAR }}

      - name: ✅ Success notification
        if: success()
        run: echo "Successfully published new version to NPM!"

      - name: ❌ Failure notification
        if: failure()
        run: echo "CI/CD pipeline failed!"
